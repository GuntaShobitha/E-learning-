<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6,
        #60a5fa
    );
}

.error-container{
    background:white;
    padding:60px 40px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:650px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.error-box{
    border:4px solid #2563eb;
    border-radius:20px;
    padding:40px;
}

.error-box h1{
    font-size:100px;
    color:black;
    margin-bottom:10px;
}

.error-box h2{
    font-size:38px;
    color:black;
    margin-bottom:20px;
}

.error-box p{
    color:#666;
    font-size:18px;
    line-height:1.8;
    margin-bottom:30px;
}

.home-btn{
    display:inline-block;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:14px 30px;
    border-radius:10px;
    transition:.3s;
}

.home-btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<div class="error-container">

    <div class="error-box">

        <h1>404</h1>

        <h2>Page Not Found</h2>

        <p>
            The page you are looking for might have been removed,
            renamed, or is temporarily unavailable.
        </p>

        <a href="index.html" class="home-btn">
            Back To Home
        </a>

    </div>

</div>

</body>
</html>
